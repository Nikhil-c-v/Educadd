<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>EduCadd Admin</title>
  <script src="https://cdn.tailwindcss.com?plugins=forms"></script>
  <script src="./site-config.js"></script>
</head>
<body class="min-h-screen bg-slate-100 text-slate-900">
  <header class="bg-slate-900 text-white">
    <div class="max-w-6xl mx-auto px-4 py-4 flex items-center justify-between">
      <h1 class="text-xl font-bold">EduCadd Admin Access</h1>
      <a href="./index.html" class="text-sm text-slate-200 hover:text-white">Back to Website</a>
    </div>
  </header>

  <main class="max-w-6xl mx-auto px-4 py-8">
    <section id="loginSection" class="max-w-md mx-auto bg-white rounded-xl shadow-sm border border-slate-200 p-6">
      <h2 class="text-lg font-semibold mb-2">Admin Login</h2>
      <p class="text-sm text-slate-600 mb-5">Use an account with role <strong>admin</strong> to access leads.</p>

      <form id="loginForm" class="space-y-4">
        <div>
          <label for="email" class="block text-sm font-medium mb-1">Email</label>
          <input id="email" type="email" required class="w-full rounded-lg border-slate-300 focus:border-slate-700 focus:ring-slate-700" />
        </div>
        <div>
          <label for="password" class="block text-sm font-medium mb-1">Password</label>
          <input id="password" type="password" required class="w-full rounded-lg border-slate-300 focus:border-slate-700 focus:ring-slate-700" />
        </div>
        <button id="loginBtn" type="submit" class="w-full bg-slate-900 text-white py-2.5 rounded-lg font-semibold hover:bg-slate-800">Sign In</button>
      </form>

      <p id="loginError" class="hidden mt-4 text-sm text-red-700 bg-red-50 border border-red-200 rounded-lg px-3 py-2"></p>
    </section>

    <section id="dashboardSection" class="hidden space-y-4">
      <div class="bg-white rounded-xl shadow-sm border border-slate-200 p-4 md:p-5 flex flex-col md:flex-row md:items-center md:justify-between gap-3">
        <div>
          <h2 class="text-lg font-semibold">Lead Dashboard</h2>
          <p id="adminInfo" class="text-sm text-slate-600"></p>
        </div>
        <div class="flex items-center gap-2">
          <button id="refreshBtn" class="px-3 py-2 rounded-lg border border-slate-300 text-sm hover:bg-slate-50">Refresh</button>
          <button id="logoutBtn" class="px-3 py-2 rounded-lg bg-slate-900 text-white text-sm hover:bg-slate-800">Logout</button>
        </div>
      </div>

      <div class="bg-white rounded-xl shadow-sm border border-slate-200 overflow-hidden">
        <div class="overflow-x-auto">
          <table class="w-full min-w-[900px]">
            <thead class="bg-slate-50 border-b border-slate-200">
              <tr class="text-left text-xs uppercase tracking-wide text-slate-600">
                <th class="px-4 py-3">Name</th>
                <th class="px-4 py-3">Phone</th>
                <th class="px-4 py-3">Email</th>
                <th class="px-4 py-3">Course</th>
                <th class="px-4 py-3">Status</th>
                <th class="px-4 py-3">Actions</th>
              </tr>
            </thead>
            <tbody id="leadTableBody" class="divide-y divide-slate-100 text-sm"></tbody>
          </table>
        </div>
      </div>

      <div class="flex items-center justify-between">
        <button id="prevBtn" class="px-3 py-2 rounded-lg border border-slate-300 text-sm hover:bg-slate-50">Previous</button>
        <p id="pageInfo" class="text-sm text-slate-600">Page 1</p>
        <button id="nextBtn" class="px-3 py-2 rounded-lg border border-slate-300 text-sm hover:bg-slate-50">Next</button>
      </div>

      <p id="dashboardError" class="hidden text-sm text-red-700 bg-red-50 border border-red-200 rounded-lg px-3 py-2"></p>
    </section>
  </main>

  <script>
    const _host = window.location.hostname;
    const API_URL = window.EDUCADD_API_URL ||
      (['localhost', '127.0.0.1', ''].includes(_host) || _host === 'null'
        ? 'http://localhost:5000'
        : window.location.origin);
    const ACCESS_TOKEN_KEY = 'educadd_admin_access_token';
    const ADMIN_USER_KEY = 'educadd_admin_user';

    const STATUS_OPTIONS = ['New', 'Contacted', 'Interested', 'Enrolled', 'Not Interested'];

    const loginSection = document.getElementById('loginSection');
    const dashboardSection = document.getElementById('dashboardSection');
    const loginForm = document.getElementById('loginForm');
    const loginBtn = document.getElementById('loginBtn');
    const loginError = document.getElementById('loginError');
    const leadTableBody = document.getElementById('leadTableBody');
    const dashboardError = document.getElementById('dashboardError');
    const pageInfo = document.getElementById('pageInfo');
    const adminInfo = document.getElementById('adminInfo');

    let currentPage = 1;
    let totalPages = 1;
    let isLoadingLeads = false;
    let accessToken = localStorage.getItem(ACCESS_TOKEN_KEY) || '';
    let currentAdmin = null;

    try {
      currentAdmin = JSON.parse(localStorage.getItem(ADMIN_USER_KEY) || 'null');
    } catch (error) {
      currentAdmin = null;
    }

    const showLoginError = (message) => {
      loginError.textContent = message;
      loginError.classList.remove('hidden');
    };

    const showDashboardError = (message) => {
      dashboardError.textContent = message;
      dashboardError.classList.remove('hidden');
    };

    const clearErrors = () => {
      loginError.classList.add('hidden');
      dashboardError.classList.add('hidden');
    };

    const saveSession = (token, user) => {
      accessToken = token || '';
      currentAdmin = user || null;
      localStorage.setItem(ACCESS_TOKEN_KEY, accessToken);
      localStorage.setItem(ADMIN_USER_KEY, JSON.stringify(currentAdmin));
    };

    const clearSession = () => {
      accessToken = '';
      currentAdmin = null;
      localStorage.removeItem(ACCESS_TOKEN_KEY);
      localStorage.removeItem(ADMIN_USER_KEY);
    };

    const authFetch = async (url, options = {}) => {
      const headers = {
        ...(options.headers || {}),
      };

      if (accessToken) {
        headers.Authorization = `Bearer ${accessToken}`;
      }

      const response = await fetch(url, {
        ...options,
        credentials: 'include',
        headers,
      });

      if (response.status === 401) {
        clearSession();
        showLogin();
        showLoginError('Your session expired. Please sign in again.');
      }

      return response;
    };

    const escapeHtml = (text) => {
      if (text === null || text === undefined) return '';
      return String(text)
        .replaceAll('&', '&amp;')
        .replaceAll('<', '&lt;')
        .replaceAll('>', '&gt;')
        .replaceAll('"', '&quot;')
        .replaceAll("'", '&#039;');
    };

    const renderLeads = (leads) => {
      if (!Array.isArray(leads) || leads.length === 0) {
        leadTableBody.innerHTML = '<tr><td colspan="6" class="px-4 py-8 text-center text-slate-500">No leads found.</td></tr>';
        return;
      }

      leadTableBody.innerHTML = leads
        .map((lead) => {
          const options = STATUS_OPTIONS
            .map((status) => `<option value="${status}" ${status === lead.status ? 'selected' : ''}>${status}</option>`)
            .join('');

          return `
            <tr>
              <td class="px-4 py-3 font-medium text-slate-800">${escapeHtml(lead.fullName)}</td>
              <td class="px-4 py-3">${escapeHtml(lead.phoneNumber)}</td>
              <td class="px-4 py-3">${escapeHtml(lead.email || 'Not provided')}</td>
              <td class="px-4 py-3">${escapeHtml(lead.selectedCourse)}</td>
              <td class="px-4 py-3">
                <select data-id="${lead.id}" class="lead-status rounded-md border-slate-300 text-sm">
                  ${options}
                </select>
              </td>
              <td class="px-4 py-3">
                <div class="flex items-center gap-2">
                  <button data-id="${lead.id}" class="save-status px-2.5 py-1.5 rounded-md bg-slate-900 text-white text-xs">Save</button>
                  <button data-id="${lead.id}" class="delete-lead px-2.5 py-1.5 rounded-md border border-red-300 text-red-700 text-xs">Delete</button>
                </div>
              </td>
            </tr>
          `;
        })
        .join('');
    };

    const fetchLeads = async (page = 1) => {
      if (isLoadingLeads) return;

      isLoadingLeads = true;
      clearErrors();

      try {
        const response = await authFetch(`${API_URL}/api/leads?page=${page}&limit=20`);

        const data = await response.json();
        if (!response.ok) {
          throw new Error(data.message || 'Failed to load leads');
        }

        currentPage = data.page || 1;
        totalPages = data.totalPages || 1;
        pageInfo.textContent = `Page ${currentPage} of ${totalPages}`;
        renderLeads(data.data || []);

        document.getElementById('prevBtn').disabled = currentPage <= 1;
        document.getElementById('nextBtn').disabled = currentPage >= totalPages;
      } catch (error) {
        showDashboardError(error.message);
      } finally {
        isLoadingLeads = false;
      }
    };

    const updateLeadStatus = async (leadId, status) => {
      clearErrors();

      try {
        const response = await authFetch(`${API_URL}/api/leads/${leadId}`, {
          method: 'PUT',
          headers: {
            'Content-Type': 'application/json',
          },
          body: JSON.stringify({ status }),
        });

        const data = await response.json();
        if (!response.ok) {
          throw new Error(data.message || 'Failed to update lead');
        }

        await fetchLeads(currentPage);
      } catch (error) {
        showDashboardError(error.message);
      }
    };

    const deleteLead = async (leadId) => {
      if (!confirm('Delete this lead? This action cannot be undone.')) {
        return;
      }

      clearErrors();

      try {
        const response = await authFetch(`${API_URL}/api/leads/${leadId}`, {
          method: 'DELETE',
        });

        const data = await response.json();
        if (!response.ok) {
          throw new Error(data.message || 'Failed to delete lead');
        }

        await fetchLeads(currentPage);
      } catch (error) {
        showDashboardError(error.message);
      }
    };

    const showDashboard = (adminUser) => {
      const name = adminUser?.fullName || adminUser?.email || 'Admin';
      adminInfo.textContent = `Signed in as ${name}`;
      loginSection.classList.add('hidden');
      dashboardSection.classList.remove('hidden');
      fetchLeads(1);
    };

    const showLogin = () => {
      dashboardSection.classList.add('hidden');
      loginSection.classList.remove('hidden');
      leadTableBody.innerHTML = '';
      pageInfo.textContent = 'Page 1';
    };

    loginForm.addEventListener('submit', async (event) => {
      event.preventDefault();
      clearErrors();

      const email = document.getElementById('email').value.trim();
      const password = document.getElementById('password').value;

      if (!email || !password) {
        showLoginError('Please enter email and password.');
        return;
      }

      loginBtn.disabled = true;
      loginBtn.textContent = 'Signing in...';

      try {
        const response = await fetch(`${API_URL}/api/auth/login`, {
          method: 'POST',
          headers: {
            'Content-Type': 'application/json',
          },
          credentials: 'include',
          body: JSON.stringify({ email, password }),
        });

        const data = await response.json();
        if (!response.ok) {
          throw new Error(data.message || 'Login failed');
        }

        if (!data.accessToken || !data.data) {
          throw new Error('Invalid login response from server');
        }

        if (data.data.role !== 'admin') {
          throw new Error('Admin access required');
        }

        saveSession(data.accessToken, data.data);
        showDashboard(data.data);
      } catch (error) {
        showLoginError(error.message);
      } finally {
        loginBtn.disabled = false;
        loginBtn.textContent = 'Sign In';
      }
    });

    const checkExistingSession = async () => {
      if (!accessToken) {
        showLogin();
        return;
      }

      try {
        const response = await authFetch(`${API_URL}/api/auth/profile`);
        const data = await response.json();

        if (!response.ok) {
          throw new Error(data.message || 'Session validation failed');
        }

        if (data?.data?.role !== 'admin') {
          throw new Error('Admin access required');
        }

        saveSession(accessToken, data.data);
        showDashboard(data.data);
      } catch (error) {
        clearSession();
        showLogin();
      }
    };

    document.getElementById('refreshBtn').addEventListener('click', () => fetchLeads(currentPage));
    document.getElementById('logoutBtn').addEventListener('click', () => {
      clearSession();
      showLogin();
    });
    document.getElementById('prevBtn').addEventListener('click', () => {
      if (currentPage > 1) {
        fetchLeads(currentPage - 1);
      }
    });
    document.getElementById('nextBtn').addEventListener('click', () => {
      if (currentPage < totalPages) {
        fetchLeads(currentPage + 1);
      }
    });

    leadTableBody.addEventListener('click', (event) => {
      const target = event.target;
      const leadId = target.getAttribute('data-id');
      if (!leadId) return;

      if (target.classList.contains('save-status')) {
        const select = document.querySelector(`select.lead-status[data-id="${leadId}"]`);
        if (select) {
          updateLeadStatus(leadId, select.value);
        }
      }

      if (target.classList.contains('delete-lead')) {
        deleteLead(leadId);
      }
    });

    checkExistingSession();
  </script>
</body>
</html>
